<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bitaxe PRO</title>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

<style>
body {background:#0b0b0b;color:#0f0;font-family:monospace;}
.grid {display:grid;grid-template-columns: repeat(2,1fr);gap:20px;}
.card {border:1px solid #0f0;padding:15px;border-radius:10px;}

table {width:100%;border-collapse:collapse;}
th,td {padding:5px;text-align:right;}
th {cursor:pointer;color:#0ff;}
td:first-child, th:first-child {text-align:left;}

button {background:black;color:#0f0;border:1px solid #0f0;margin:2px;}
</style>
</head>

<body>

<h1>⚡ Bitaxe PRO</h1>

<select id="coin" onchange="setCoin()">
<option>BTC</option>
<option>BSV</option>
<option>FCH</option>
</select>

<h2>Total: <span id="total"></span> TH/s</h2>
<p>Diff: <span id="diff"></span></p>
<p>Price: $<span id="price"></span></p>
<p>Block: $<span id="block"></span></p>

<div id="miners" class="grid"></div>

<script>
const socket = io();

const charts = {};
const timelineCharts = {};
const pies = {};
const bigCache = {};
const pageState = {};
const sortState = {};

const MAX_POINTS = 200;

function safe(n){ return (typeof n==="number" && !isNaN(n)) ? n : 0; }

function formatDate(ts){
let d=new Date(ts*1000);
return d.toLocaleDateString()+" "+d.toLocaleTimeString();
}

function getBucketLabel(d){
if(d>=1e9) return "1G+";
if(d>=1e8) return "100M+";
if(d>=1e7) return "10M+";
if(d>=1e6) return "1M+";
return "100k+";
}

function bucketColor(label){
if(label==="1G+") return "#ff4d4d";
if(label==="100M+") return "#ff944d";
if(label==="10M+") return "#ffd24d";
if(label==="1M+") return "#4dff88";
return "#4da6ff";
}

function createMiner(name){
if(!(name in pageState)) pageState[name]=0;
if(!(name in sortState)) sortState[name]={col:5,asc:false};

return `<div class="card">
<h2>${name}</h2>

<p>HR: <span id="${name}_h"></span></p>
<p>Temp: <span id="${name}_t"></span></p>
<p>Best: <span id="${name}_b"></span></p>
<p>Near: <span id="${name}_p"></span></p>

<canvas id="${name}_c" height="200"></canvas>
<canvas id="${name}_timeline" height="200"></canvas>

<div id="${name}_bucket"></div>

<table id="${name}_big">
<thead>
<tr>
<th onclick="sortTable('${name}',0)">Diff</th>
<th onclick="sortTable('${name}',1)">HR</th>
<th onclick="sortTable('${name}',2)">Temp</th>
<th onclick="sortTable('${name}',3)">%</th>
<th onclick="sortTable('${name}',4)">Left</th>
<th onclick="sortTable('${name}',5)">Date</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div>
<button onclick="prevPage('${name}')">◀</button>
<span id="${name}_page"></span>
<button onclick="nextPage('${name}')">▶</button>
</div>

<canvas id="${name}_pie" height="200"></canvas>
</div>`;
}

function initChart(name){
setTimeout(()=>{
let ctx=document.getElementById(name+"_c");
charts[name]=new Chart(ctx,{type:'scatter',data:{datasets:[]},options:{animation:false}});
},100);
}

function initTimeline(name){
setTimeout(()=>{
let ctx=document.getElementById(name+"_timeline");
timelineCharts[name]=new Chart(ctx,{
type:'line',
data:{datasets:[]},
options:{
animation:false,
elements:{point:{radius:2},line:{tension:0.2}},
scales:{
x:{type:'time',time:{unit:'minute'}},
y:{type:'logarithmic'}
}
}
});
},100);
}

function rebuildCharts(name){
let data = bigCache[name] || [];

let buckets={"1G+":[],"100M+":[],"10M+":[],"1M+":[],"100k+":[]};

let recent = data.slice(0,MAX_POINTS).reverse();

recent.forEach((x,i)=>{
let diff=x[0];
let label=getBucketLabel(diff);
buckets[label].push({x:i,y:diff});
});

charts[name].data.datasets = Object.keys(buckets).map(k=>({
label:k,data:buckets[k],backgroundColor:bucketColor(k),pointRadius:4
}));
charts[name].update();

let timelineData = recent.map(x=>({x:x[6]*1000,y:x[0]}));

timelineCharts[name].data.datasets = [{
label:"Diff",
data:timelineData,
borderColor:"#00ffcc",
pointRadius:2,
tension:0.2,
fill:false
}];

timelineCharts[name].update();
}

// 🔥 FIX: SOLO cache
async function loadBig(name){
let r=await fetch("/big/"+name);
let d=await r.json();
bigCache[name]=d;
}

function renderTable(name){

let data=[...(bigCache[name]||[])];

// asegurar estados
if(!(name in pageState)) pageState[name]=0;
if(!(name in sortState)) sortState[name]={col:5,asc:false};

let page = pageState[name];
let {col,asc}=sortState[name];
let perPage=10;

// 🔥 SORT FIX
data.sort((a,b)=>{

let v1 = (col===5)?a[6]:a[col];
let v2 = (col===5)?b[6]:b[col];

v1 = Number(v1);
v2 = Number(v2);

if(isNaN(v1)) v1 = 0;
if(isNaN(v2)) v2 = 0;

return asc ? v1 - v2 : v2 - v1;
});

let max=Math.ceil(data.length/perPage)||1;

if(page>=max){
pageState[name]=Math.max(0,max-1);
}

let slice=data.slice(pageState[name]*perPage,(pageState[name]+1)*perPage);

document.getElementById(name+"_page").innerText =
`${pageState[name]+1}/${max}`;

document.querySelector(`#${name}_big tbody`).innerHTML =
slice.map(x=>{
let label=getBucketLabel(x[0]);
return `<tr>
<td style="color:${bucketColor(label)}">${Math.round(x[0])}</td>
<td>${safe(x[2]).toFixed(2)}</td>
<td>${safe(x[3])}</td>
<td>${safe(x[4]).toFixed(4)}%</td>
<td>${Math.round(safe(x[5]))}</td>
<td>${formatDate(x[6])}</td>
</tr>`;
}).join("");
}

function sortTable(name,col){

if(!(name in sortState)){
    sortState[name]={col:5,asc:false};
}

let s = sortState[name];

if(s.col === col){
    s.asc = !s.asc;
}else{
    s.col = col;
    s.asc = true;
}

renderTable(name);
}
function nextPage(name){pageState[name]++;renderTable(name);}
function prevPage(name){pageState[name]=Math.max(0,pageState[name]-1);renderTable(name);}

function updatePie(name){
let data=bigCache[name]||[];
let buckets={};
data.forEach(x=>{
let l=getBucketLabel(x[0]);
buckets[l]=(buckets[l]||0)+1;
});

let labels=Object.keys(buckets);
let vals=labels.map(l=>buckets[l]);
let colors=labels.map(l=>bucketColor(l));

if(!pies[name]){
pies[name]=new Chart(document.getElementById(name+"_pie"),{
type:'pie',
data:{labels:labels,datasets:[{data:vals,backgroundColor:colors}]}
});
}else{
pies[name].data.labels=labels;
pies[name].data.datasets[0].data=vals;
pies[name].update();
}
}

function updateBucketText(name){
let data=bigCache[name]||[];
let buckets={};
data.forEach(x=>{
let l=getBucketLabel(x[0]);
buckets[l]=(buckets[l]||0)+1;
});

let txt="";
Object.keys(buckets).forEach(k=>{
txt+=`<span style="color:${bucketColor(k)}">${k}: ${buckets[k]}</span> | `;
});
document.getElementById(name+"_bucket").innerHTML=txt;
}

socket.on("update", data=>{

total.innerText=safe(data.total.hashrate);
diff.innerText=data.network.difficulty_fmt;
price.innerText=safe(data.network.price);
block.innerText=Math.round(safe(data.network.block_value));
coin.value=data.network.coin;

if(miners.innerHTML===""){
for(let n in data.miners){
miners.innerHTML+=createMiner(n);
initChart(n);
initTimeline(n);
loadBig(n);
}
}

for(let n in data.miners){
let m=data.miners[n];
document.getElementById(n+"_h").innerText=safe(m.hashrate).toFixed(2);
document.getElementById(n+"_t").innerText=safe(m.temp);
document.getElementById(n+"_b").innerText=m.best_diff_fmt;
document.getElementById(n+"_p").innerText=safe(m.last_percent).toFixed(4)+"%";
}

// 🔥 render centralizado
for(let n in data.miners){
if(bigCache[n]){
renderTable(n);
updatePie(n);
updateBucketText(n);
rebuildCharts(n);
}
}

if(!window.lastDB) window.lastDB=0;
if(Date.now()-window.lastDB>5000){
for(let n in data.miners) loadBig(n);
window.lastDB=Date.now();
}

});
</script>

</body>
</html>
